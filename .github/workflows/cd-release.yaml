name: CD Pipeline

permissions:
  contents: write
  issues: write

on:
  push:
    branches: [main, master]
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches: [main, master]

jobs:
  semver:
    uses: woped/devops/.github/workflows/semver-and-release-notes.yaml@main

  repo_version_tag:
    name: Tag repo with bump policy
    runs-on: ubuntu-latest
    needs: [approval]
    env:
      ALLOW_MINOR_BUMP: ${{ vars.ALLOW_MINOR_BUMP }}
      ALLOW_MAJOR_BUMP: ${{ vars.ALLOW_MAJOR_BUMP }}
      SEMVER_VERSION: ${{ needs.semver.outputs.VERSION }}
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      tag_created: ${{ steps.tag.outputs.tag_created }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        id: tag
        shell: bash
        run: |
          normalize_bool() {
            case "$(echo "$1" | tr '[:upper:]' '[:lower:]')" in
              true|1|yes|y|on) echo "true" ;;
              *) echo "false" ;;
            esac
          }

          ALLOW_MINOR="$(normalize_bool "${ALLOW_MINOR_BUMP:-false}")"
          ALLOW_MAJOR="$(normalize_bool "${ALLOW_MAJOR_BUMP:-false}")"

          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi

          BASE_VERSION="${LATEST_TAG#v}"
          IFS='.' read -r BASE_MAJOR BASE_MINOR BASE_PATCH <<< "$BASE_VERSION"

          TARGET_MAJOR="$BASE_MAJOR"
          TARGET_MINOR="$BASE_MINOR"
          TARGET_PATCH=$((BASE_PATCH + 1))

          if [[ "$SEMVER_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
            IFS='.' read -r SEM_MAJOR SEM_MINOR SEM_PATCH <<< "${SEMVER_VERSION%%[-+]*}"

            if [ "$SEM_MAJOR" -gt "$BASE_MAJOR" ] && [ "$ALLOW_MAJOR" = "true" ]; then
              TARGET_MAJOR="$SEM_MAJOR"
              TARGET_MINOR="$SEM_MINOR"
              TARGET_PATCH="$SEM_PATCH"
              echo "Applying major bump from semver: $SEMVER_VERSION"
            elif [ "$SEM_MAJOR" -eq "$BASE_MAJOR" ] && [ "$SEM_MINOR" -gt "$BASE_MINOR" ] && [ "$ALLOW_MINOR" = "true" ]; then
              TARGET_MAJOR="$SEM_MAJOR"
              TARGET_MINOR="$SEM_MINOR"
              TARGET_PATCH="$SEM_PATCH"
              echo "Applying minor bump from semver: $SEMVER_VERSION"
            else
              echo "Applying automatic patch bump from latest tag: $LATEST_TAG"
            fi
          else
            echo "Semver output is empty or invalid ('$SEMVER_VERSION'); applying automatic patch bump."
          fi

          TAG="v${TARGET_MAJOR}.${TARGET_MINOR}.${TARGET_PATCH}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists on origin."
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag_created=true" >> "$GITHUB_OUTPUT"

  approval:
    uses: woped/devops/.github/workflows/manual-approval.yaml@main
    needs: semver
    with:
      VERSION: ${{ needs.semver.outputs.VERSION }}

  gh_release:
    uses: woped/devops/.github/workflows/github-release-python-flask.yaml@main
    needs: [semver, approval, repo_version_tag]
    if: ${{ needs.repo_version_tag.outputs.tag_created == 'true' }}
    with:
      TAG: ${{ needs.repo_version_tag.outputs.tag }}
      RELEASE_NOTES: ${{ needs.semver.outputs.RELEASE_NOTES }}

  docker_build_and_push_python:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: [semver, approval, repo_version_tag]
    if: ${{ needs.repo_version_tag.outputs.tag_created == 'true' }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Resolve image tags
        id: image_meta
        shell: bash
        run: |
          TAG="${{ needs.repo_version_tag.outputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $TAG"
            exit 1
          fi

          VERSION="${TAG#v}"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          IMAGE_NAME="${GITHUB_REPOSITORY#*/}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            woped/${{ steps.image_meta.outputs.image_name }}:${{ steps.image_meta.outputs.tag }}
            woped/${{ steps.image_meta.outputs.image_name }}:${{ steps.image_meta.outputs.version }}
            woped/${{ steps.image_meta.outputs.image_name }}:rc-${{ steps.image_meta.outputs.short_sha }}
