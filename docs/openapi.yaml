openapi: 3.0.3
info:
  title: WOPED T2P LLM API Connector — Internal API
  description: |
    Internal HTTP API consumed by t2p-2.0. It accepts a process description
    plus a provider/model selection, builds the prompt, dispatches the call to
    the chosen LLM provider, and returns the raw provider response.

    This spec is the machine-readable form of `docs/api-contract.md`; when the
    two disagree, the markdown contract is authoritative.
  version: 1.5.0
  contact:
    name: API Support
servers:
  # Relative URL so Swagger UI targets whatever host/port the docs page was
  # loaded from. A hard-coded http://localhost:5000 here meant requests always
  # went to 5000 even when the app was started on another port.
  - url: /
    description: Same origin as this documentation page

paths:
  /generate:
    post:
      summary: Generate a model from a process description
      description: >-
        Builds the prompt, dispatches the call to the selected provider/model,
        and returns the raw provider response. The provider API key is supplied
        in the Authorization header and never appears in the body.
      operationId: generate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: Generation successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResult'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'
        '502':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'

  /models:
    get:
      summary: List available providers and models
      operationId: models
      responses:
        '200':
          description: Available models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelsResponse'
        '500':
          $ref: '#/components/responses/Error'

  /metrics:
    get:
      summary: Prometheus metrics
      operationId: metrics
      responses:
        '200':
          description: Metrics in Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string

  /_/_/echo:
    get:
      summary: Liveness echo
      operationId: echo
      responses:
        '200':
          description: Service is reachable

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "Provider API key, forwarded as `Authorization: Bearer <api_key>`."

  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    GenerateRequest:
      type: object
      required: [user_text, provider, model]
      properties:
        user_text:
          type: string
          description: Natural-language process description.
          example: "Start with a user request. Check inventory. If available, process the order; otherwise notify the user."
        provider:
          type: string
          description: LLM provider; one of the values from GET /models.
          example: openai
        model:
          type: string
          description: Model name; one of the values from GET /models.
          example: gpt-5.4-mini
        prompting_strategy:
          type: string
          description: Prompting strategy to use. Defaults to "few_shot" if omitted.
          enum: [few_shot, zero_shot]
          default: few_shot

    GenerateResult:
      type: object
      properties:
        raw_response:
          type: string
          description: The raw provider response.

    ModelsResponse:
      type: object
      properties:
        models:
          type: array
          items:
            type: object
            properties:
              provider:
                type: string
                example: openai
              model:
                type: string
                example: gpt-5.4-mini
              supports_temperature:
                type: boolean
                description: >-
                  Whether the model accepts a `temperature` (sampling) parameter.
                  Reasoning models (GPT-5.x / o-series) reject it.
                example: false
              pricing:
                type: object
                description: >-
                  Token pricing in USD per 1,000,000 tokens. `cached_input` is
                  present only for models that offer a reduced cached-input rate.
                properties:
                  input:
                    type: number
                    example: 0.75
                  cached_input:
                    type: number
                    example: 0.075
                  output:
                    type: number
                    example: 4.50

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: >-
                Stable identifier. Known values: `invalid_request`,
                `invalid_provider` (400); `unauthorized` (401); `upstream_error`
                (429 retryable / 502 bad gateway — the `message` carries the
                provider's own error text); `internal_error` (500).
              example: invalid_request
            message:
              type: string
              description: >-
                Human-readable detail. For `upstream_error` this is the raw
                error text returned by the LLM provider.
              example: "Missing or empty field(s): provider."
